---
layout: default
---
<article class="article">
    <div class="article-inner">
        <a href="/research-notes/" class="article-back">
            <svg width="14" height="14" viewBox="0 0 18 18" fill="none"><path d="M14 9H4M4 9L8.5 4.5M4 9L8.5 13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Notes
        </a>
        <header class="article-header">
            {% if page.date %}
            <p class="article-meta">
                <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %-d, %Y" }}</time>
                {% if page.tags %} · {{ page.tags | join: " · " }}{% endif %}
            </p>
            {% endif %}
            <h1>{{ page.title }}</h1>
            {% if page.description %}<p>{{ page.description }}</p>{% endif %}
        </header>
        <div class="article-content">
            {{ content }}
        </div>
    </div>
</article>
